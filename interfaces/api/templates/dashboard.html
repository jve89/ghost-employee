<!DOCTYPE html>
<html>
<head>
    <title>Ghost Dashboard</title>
    <script>
        async function refreshDashboard() {
            const logsRes = await fetch("/jobs/logs");
            const statusRes = await fetch("/jobs/status");
            const retryRes = await fetch("/jobs/retry-queue");

            const logs = await logsRes.json();
            const statuses = await statusRes.json();
            const retry = await retryRes.json();

            document.getElementById("logs").innerText = logs.logs.join("\n");
            document.getElementById("status").innerText = JSON.stringify(statuses, null, 2);
            const retryBody = document.getElementById("retry-body");
retryBody.innerHTML = "";

if (retry.retry_queue.length === 0) {
    retryBody.innerHTML = "<tr><td colspan='3'>No retry tasks.</td></tr>";
} else {
    retry.retry_queue.forEach(entry => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${entry.task.description}</td>
            <td>${entry.timestamp}</td>
            <td><button onclick="retryTask('${entry.id}')">Retry</button></td>
        `;
        retryBody.appendChild(row);
    });
}
        }

        setInterval(refreshDashboard, 10000);
        window.onload = refreshDashboard;
    </script>
    <style>
    #retry-table th, #retry-table td {
        border: 1px solid #ccc;
        padding: 8px;
    }
    </style>
</head>
<body>
    <h1>Ghost Employee Dashboard</h1>

    <div class="actions">
        <h2>Actions</h2>
        <form action="/jobs/retry-failed" method="post" style="margin-bottom: 20px;">
            <button type="submit">Retry Failed Tasks</button>
        </form>
    </div>
    
    <h2>Jobs</h2>
    <div id="jobTiles">Loading...</div>

    <h2>Retry Queue</h2>
    <table id="retry-table" style="border-collapse: collapse; width: 100%;">
        <thead>
            <tr>
                <th>Description</th>
                <th>Timestamp</th>
                <th>Retry</th>
            </tr>
        </thead>
        <tbody id="retry-body">
            <tr><td colspan="3">Loading...</td></tr>
        </tbody>
    </table>

    <h2>Logs</h2>
    <pre id="logs">Loading...</pre>

    <script>
        async function runJob(jobName) {
            await fetch(`/jobs/run/` + jobName, { method: "POST" });
            loadJobs();
            loadLogs();
        }

        async function loadJobs() {
            const jobsRes = await fetch("/jobs");
            const statusRes = await fetch("/jobs/status");
            const jobs = await jobsRes.json();
            const statuses = await statusRes.json();

            const container = document.getElementById("jobTiles");
            container.innerHTML = "";

            jobs.forEach(job => {
                const tile = document.createElement("div");
                tile.style.border = "1px solid #ccc";
                tile.style.padding = "10px";
                tile.style.margin = "5px";
                tile.style.display = "inline-block";

                const lastRun = statuses[job.job_name] || "never";

                tile.innerHTML = `
                    <strong>${job.job_name}</strong><br/>
                    Last run: ${lastRun}<br/>
                    <button onclick="runJob('${job.job_name}')">Run</button>
                `;

                container.appendChild(tile);
            });
        }

        async function loadLogs() {
            const res = await fetch("/jobs/logs");
            const data = await res.json();
            document.getElementById("logBox").innerText = data.logs.join("\n");
        }

        async function loadExports() {
            const res = await fetch("/jobs/exports");
            const data = await res.json();
            const lines = data.map(e => `${e.timestamp} → ${e.destination}: ${e.task_description}`);
            document.getElementById("exportBox").innerText = lines.join("\n");
        }

        window.onload = function() {
            loadJobs();
            loadLogs();
            loadExports();
        };
    </script>
</body>
</html>
